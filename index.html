    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Druto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Druto is a digital loyalty rewards platform that helps you earn rewards at your favorite local businesses including cafés, restaurants, salons, gyms, car washes, and retail stores."
          }
        },
        {
          "@type": "Question",
          "name": "How do I earn rewards?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simply visit a participating business, scan their QR code with your phone, and collect digital stamps. Once you complete your stamp card, you earn a free reward!"
          }
        },
        {
          "@type": "Question",
          "name": "Is Druto free for customers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Druto is completely free for customers. Just sign up, scan QR codes at participating businesses, and start earning rewards."
          }
        },
        {
          "@type": "Question",
          "name": "What plans are available for businesses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer three plans: Starter (₹229/mo, 1 location), Growth (₹499/mo, up to 3 locations with GPS branch detection), and Pro (₹999/mo, up to 6 locations). All plans include a 3-day free trial with no payment required. Enterprise plans with unlimited locations are also available."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use one QR code for multiple branches?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! With the Growth and Pro plans, you use a single QR code for all your branches. Druto automatically detects which branch a customer is at using GPS location."
          }
        },
        {
          "@type": "Question",
          "name": "How do I redeem my reward?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Once you've collected all the required stamps, your reward will appear in the app. Simply show it to the staff at the business to claim your free reward."
          }
        },
        {
          "@type": "Question",
          "name": "Do I get a free QR code stand?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! All paid plans come with a FREE physical QR code stand delivered to your business so customers can easily scan and collect stamps."
          }
        }
      ]
    }
    </script>
